<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="¿Qué es la polla?">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: white; stroke: #e2e8f0; stroke-width: 1.5; }
    .title { font: 700 26px system-ui, sans-serif; fill: #0f172a; }
    .subtitle { font: 500 16px system-ui, sans-serif; fill: #475569; }
    .pill { fill: #dbeafe; }
    .pill-text { font: 600 14px system-ui, sans-serif; fill: #1d4ed8; }
    .icon { fill: #3b82f6; }
    .label { font: 500 13px system-ui, sans-serif; fill: #334155; }
    .emoji { font: 32px system-ui, sans-serif; }
    .trophy { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
  </style>

  <rect class="bg" width="600" height="400" rx="16"/>

  <g transform="translate(280, 30)">
    <path class="trophy" d="M-22 -8 h44 v18 a22 22 0 0 1 -44 0 z"/>
    <path class="trophy" d="M-22 -3 h-8 a8 8 0 0 0 0 16 h6 M22 -3 h8 a8 8 0 0 1 0 16 h-6"/>
    <rect class="trophy" x="-10" y="12" width="20" height="6" rx="1"/>
    <rect class="trophy" x="-16" y="18" width="32" height="4" rx="1"/>
  </g>

  <text class="title" x="300" y="100" text-anchor="middle">¿Qué es la polla?</text>
  <text class="subtitle" x="300" y="128" text-anchor="middle">Apostá los marcadores del Mundial</text>

  <g transform="translate(60, 165)">
    <rect class="card" width="220" height="58" rx="10"/>
    <text class="emoji" x="22" y="38">⚽</text>
    <text class="label" x="58" y="28">Marcador por partido</text>
    <text class="pill-text" x="58" y="48">5 / 3 / 0 puntos</text>
  </g>

  <g transform="translate(320, 165)">
    <rect class="card" width="220" height="58" rx="10"/>
    <text class="emoji" x="22" y="38">🏆</text>
    <text class="label" x="58" y="28">Campeón del Mundial</text>
    <text class="pill-text" x="58" y="48">+25 puntos</text>
  </g>

  <g transform="translate(60, 235)">
    <rect class="card" width="220" height="58" rx="10"/>
    <rect class="icon" x="14" y="14" width="30" height="30" rx="6"/>
    <text fill="white" font="700 16px system-ui" x="29" y="35" text-anchor="middle">2</text>
    <text class="label" x="58" y="28">Subcampeón</text>
    <text class="pill-text" x="58" y="48">+15 puntos</text>
  </g>

  <g transform="translate(320, 235)">
    <rect class="card" width="220" height="58" rx="10"/>
    <text class="emoji" x="22" y="38">🥅</text>
    <text class="label" x="58" y="28">Goleador del torneo</text>
    <text class="pill-text" x="58" y="48">+15 puntos</text>
  </g>

  <g transform="translate(180, 320)">
    <rect class="pill" width="240" height="40" rx="20"/>
    <text class="pill-text" x="120" y="25" text-anchor="middle">El que más puntos suma, gana 🏆</text>
  </g>
</svg>
