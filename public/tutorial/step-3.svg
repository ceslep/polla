<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="Cómo subir tu archivo">
  <style>
    .bg { fill: #f8fafc; }
    .browser { fill: white; stroke: #cbd5e1; stroke-width: 1.5; }
    .browser-bar { fill: #f1f5f9; }
    .url { fill: #cbd5e1; }
    .url-text { font: 400 10px ui-monospace, monospace; fill: #475569; }
    .tab { fill: white; stroke: #cbd5e1; }
    .tab-text { font: 500 10px system-ui, sans-serif; fill: #334155; }
    .dropzone { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 6 4; }
    .dropzone-text { font: 600 14px system-ui, sans-serif; fill: #1e40af; }
    .dropzone-sub { font: 400 11px system-ui, sans-serif; fill: #3b82f6; }
    .icon-upload { fill: #3b82f6; }
    .header { fill: #1e3a8a; }
    .header-text { font: 700 14px system-ui, sans-serif; fill: white; }
    .step-circle { fill: #3b82f6; }
    .step-num { font: 700 12px system-ui, sans-serif; fill: white; }
    .step-text { font: 500 13px system-ui, sans-serif; fill: #0f172a; }
  </style>

  <rect class="bg" width="600" height="400" rx="16"/>

  <text font="700 18px system-ui, sans-serif" fill="#0f172a" x="300" y="30" text-anchor="middle">Subí tu archivo a la app</text>

  <!-- Browser window mockup -->
  <g transform="translate(40, 60)">
    <rect class="browser" width="380" height="290" rx="8"/>

    <!-- Title bar -->
    <rect class="browser-bar" width="380" height="32" rx="8"/>
    <rect class="browser-bar" y="20" width="380" height="12"/>
    <circle cx="16" cy="16" r="5" fill="#ef4444"/>
    <circle cx="32" cy="16" r="5" fill="#f59e0b"/>
    <circle cx="48" cy="16" r="5" fill="#10b981"/>

    <!-- Tab -->
    <rect class="tab" x="70" y="6" width="160" height="22" rx="3"/>
    <text class="tab-text" x="80" y="20">⚽ Polla Mundial 2026</text>

    <!-- URL bar -->
    <rect class="url" x="70" y="40" width="290" height="20" rx="10"/>
    <text class="url-text" x="84" y="54">ceslep.github.io/polla/</text>

    <!-- App header -->
    <rect class="header" x="0" y="68" width="380" height="36"/>
    <text class="header-text" x="190" y="91" text-anchor="middle">⚽ POLLA MUNDIAL 2026</text>

    <!-- Dropzone -->
    <g transform="translate(40, 130)">
      <rect class="dropzone" width="300" height="120" rx="12"/>
      <!-- Upload icon -->
      <g transform="translate(135, 25)">
        <path class="icon-upload" d="M15 0 a15 15 0 0 0 -15 15 v15 a15 15 0 0 0 15 15 h12 l -3 -3 a2 2 0 0 1 0 -3 l3 -3 h-12 a9 9 0 0 1 0 -18 h12 a9 9 0 0 1 9 9 v3 l-3 -3 a2 2 0 0 1 0 -3 l3 -3 v-9 a15 15 0 0 0 -15 -15 z" transform="scale(1) translate(0,5)"/>
      </g>
      <text class="dropzone-text" x="150" y="78" text-anchor="middle">Arrastrá tu .json acá</text>
      <text class="dropzone-sub" x="150" y="98" text-anchor="middle">o hacé click para elegirlo</text>
    </g>
  </g>

  <!-- Right side: instructions -->
  <g transform="translate(440, 80)">
    <g transform="translate(0, 0)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="19" text-anchor="middle">1</text>
      <text class="step-text" x="36" y="12">Andá a la app</text>
      <text class="step-text" x="36" y="28" font-weight="400" fill="#475569">ceslep.github.io/polla</text>
    </g>
    <g transform="translate(0, 70)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="19" text-anchor="middle">2</text>
      <text class="step-text" x="36" y="12">Subí el .json</text>
      <text class="step-text" x="36" y="28" font-weight="400" fill="#475569">arrastrando o click</text>
    </g>
    <g transform="translate(0, 140)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="19" text-anchor="middle">3</text>
      <text class="step-text" x="36" y="12">¡Listo!</text>
      <text class="step-text" x="36" y="28" font-weight="400" fill="#475569">tus apuestas aparecen</text>
    </g>
  </g>

  <!-- arrow from upload icon -->
  <path d="M 250 230 Q 280 200 320 180" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
</svg>
