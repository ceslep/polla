<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="Cómo exportar el chat de WhatsApp">
  <style>
    .bg { fill: #f8fafc; }
    .phone { fill: #1f2937; }
    .screen { fill: #ece5dd; }
    .header { fill: #075e54; }
    .bubble-in { fill: white; stroke: #d4d4d8; }
    .bubble-out { fill: #dcf8c6; }
    .bubble-text { font: 400 9px system-ui, sans-serif; fill: #1f2937; }
    .bubble-time { font: 400 7px system-ui, sans-serif; fill: #6b7280; }
    .header-text { font: 600 11px system-ui, sans-serif; fill: white; }
    .header-sub { font: 400 8px system-ui, sans-serif; fill: #a7f3d0; }
    .annot { font: 500 11px system-ui, sans-serif; fill: #dc2626; }
    .annot-line { stroke: #dc2626; stroke-width: 1.5; fill: none; }
    .annot-dot { fill: #dc2626; }
    .step-circle { fill: #dc2626; }
    .step-num { font: 700 11px system-ui, sans-serif; fill: white; }
    .step-text { font: 500 12px system-ui, sans-serif; fill: #0f172a; }
    .icon-dots { fill: white; }
    .menu { fill: white; stroke: #d4d4d8; }
    .menu-item { font: 500 10px system-ui, sans-serif; fill: #1f2937; }
    .menu-active { fill: #e0e7ff; }
  </style>

  <rect class="bg" width="600" height="400" rx="16"/>

  <!-- Title -->
  <text font="700 18px system-ui, sans-serif" fill="#0f172a" x="300" y="32" text-anchor="middle">Exportá tu chat de WhatsApp</text>

  <!-- Phone mockup -->
  <g transform="translate(70, 60)">
    <rect class="phone" width="140" height="290" rx="14"/>
    <rect class="screen" x="6" y="22" width="128" height="266" rx="4"/>

    <!-- Status bar -->
    <text font="600 7px system-ui" fill="#1f2937" x="70" y="32" text-anchor="middle">9:41</text>

    <!-- Chat header -->
    <rect class="header" x="6" y="38" width="128" height="22"/>
    <text class="header-text" x="14" y="49">← Polla Mundial 2026</text>
    <text class="header-sub" x="14" y="57">en línea</text>

    <!-- Three dots menu (HIGHLIGHTED) -->
    <g transform="translate(118, 48)">
      <circle class="icon-dots" cx="0" cy="0" r="1.4"/>
      <circle class="icon-dots" cx="0" cy="4" r="1.4"/>
      <circle class="icon-dots" cx="0" cy="8" r="1.4"/>
    </g>

    <!-- Open menu (the dropdown) -->
    <g transform="translate(60, 62)">
      <rect class="menu" width="68" height="56" rx="2"/>
      <rect class="menu-active" x="0" y="0" width="68" height="14"/>
      <text class="menu-item" x="6" y="10">Info del grupo</text>
      <text class="menu-item" x="6" y="24">Buscar</text>
      <text class="menu-item" x="6" y="38">Silenciar</text>
      <text class="menu-item" x="6" y="52">Más ▾</text>
    </g>

    <!-- Chat bubbles below -->
    <g transform="translate(14, 130)">
      <rect class="bubble-in" width="80" height="22" rx="6"/>
      <text class="bubble-text" x="4" y="10">México 2-0</text>
      <text class="bubble-text" x="4" y="19">Sudáfri</text>
    </g>
    <g transform="translate(44, 158)">
      <rect class="bubble-out" width="86" height="22" rx="6"/>
      <text class="bubble-text" x="4" y="10">Brasil 3 vs</text>
      <text class="bubble-text" x="4" y="19">Marruecos 1</text>
    </g>
  </g>

  <!-- Annotation arrow 1: from dots icon to text -->
  <path class="annot-line" d="M 198 110 Q 230 100 250 95"/>
  <circle class="annot-dot" cx="200" cy="110" r="3"/>

  <!-- Right side: 3 steps list -->
  <g transform="translate(330, 80)">
    <!-- Step 1 -->
    <g transform="translate(0, 0)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="18" text-anchor="middle">1</text>
      <text class="step-text" x="36" y="12">Tocá los 3 puntos ⋮</text>
      <text class="step-text" x="36" y="26" fill="#47569" font-weight="400">arriba a la derecha</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(0, 64)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="18" text-anchor="middle">2</text>
      <text class="step-text" x="36" y="12">Elegí "Más"</text>
      <text class="step-text" x="36" y="26" fill="#47569" font-weight="400">al final del menú</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(0, 128)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="18" text-anchor="middle">3</text>
      <text class="step-text" x="36" y="12">"Exportar chat"</text>
      <text class="step-text" x="36" y="26" fill="#47569" font-weight="400">sin multimedia, .zip</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(0, 192)">
      <circle class="step-circle" cx="14" cy="14" r="14"/>
      <text class="step-num" x="14" y="18" text-anchor="middle">4</text>
      <text class="step-text" x="36" y="12">Descomprimí el .zip</text>
      <text class="step-text" x="36" y="26" fill="#47569" font-weight="400">queda un archivo .json</text>
    </g>
  </g>
</svg>
